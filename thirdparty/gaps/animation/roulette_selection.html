<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轮盘赌选择算法 - Roulette Wheel Selection</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.2em;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel h2 {
            color: #00d9ff;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #00d9ff;
            border-radius: 2px;
        }

        .population-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-box {
            background: rgba(0, 217, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .info-box .value {
            font-size: 2em;
            font-weight: bold;
            color: #00d9ff;
        }

        .info-box .label {
            color: #8892b0;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .individuals-table {
            width: 100%;
            border-collapse: collapse;
        }

        .individuals-table th,
        .individuals-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .individuals-table th {
            color: #00ff88;
            font-weight: 600;
        }

        .individuals-table tr:hover {
            background: rgba(0, 255, 136, 0.1);
        }

        .individuals-table tr.elite {
            background: rgba(255, 215, 0, 0.2);
        }

        .individuals-table tr.selected {
            background: rgba(0, 217, 255, 0.3);
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .roulette-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #rouletteCanvas {
            max-width: 100%;
        }

        .pointer {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            z-index: 10;
            transition: transform 0.1s ease;
        }

        .cumulative-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .cumulative-bar {
            display: flex;
            height: 40px;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 10px;
        }

        .cumulative-segment {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
            transition: all 0.3s ease;
            position: relative;
        }

        .cumulative-segment.highlight {
            transform: scaleY(1.1);
            box-shadow: 0 0 20px currentColor;
        }

        .selection-result {
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-title {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #00ff88;
            border-radius: 2px;
        }

        .pairs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .pair {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(0, 255, 136, 0.2));
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .pair-number {
            background: #00d9ff;
            color: #1a1a2e;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .individual-chip {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 500;
        }

        .vs {
            color: #8892b0;
            font-weight: bold;
        }

        .controls {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .step-description {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            line-height: 1.8;
        }

        .step-description h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }

        .step-description code {
            background: rgba(0, 217, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
        }

        .random-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #ff4757;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            margin: 15px 0;
        }

        .highlight-segment {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px solid #ff4757;
            border-radius: 8px;
            animation: highlightPulse 0.5s ease infinite;
        }

        @keyframes highlightPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .explanation {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 215, 0, 0.1);
            border-left: 3px solid #ffd700;
            border-radius: 0 8px 8px 0;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <h1>🎯 轮盘赌选择算法</h1>
    <p class="subtitle">Roulette Wheel Selection - 遗传算法中的选择算子</p>

    <div class="container">
        <div class="panel">
            <h2>种群信息</h2>
            <div class="population-info">
                <div class="info-box">
                    <div class="value" id="popSize">8</div>
                    <div class="label">种群大小</div>
                </div>
                <div class="info-box">
                    <div class="value" id="eliteCount">2</div>
                    <div class="label">精英数量</div>
                </div>
            </div>

            <h2>个体详情</h2>
            <table class="individuals-table">
                <thead>
                    <tr>
                        <th>编号</th>
                        <th>适应度</th>
                        <th>累积概率</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="individualsBody">
                </tbody>
            </table>

            <div class="explanation" id="explanation">
                点击"开始选择"按钮开始动画演示
            </div>
        </div>

        <div class="panel">
            <h2>轮盘可视化</h2>
            <div class="roulette-container">
                <div class="pointer" id="pointer"></div>
                <canvas id="rouletteCanvas" width="350" height="350"></canvas>
            </div>

            <div class="cumulative-section">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>累积概率区间</span>
                    <span id="totalFitness">总适应度: 0</span>
                </div>
                <div class="cumulative-bar" id="cumulativeBar"></div>
            </div>

            <div class="random-value" id="randomValue" style="display: none;">
                随机数: <span id="randomNum">0</span>
            </div>

            <div class="step-description" id="stepDescription" style="display: none;">
                <h3>选择过程</h3>
                <p id="stepText"></p>
            </div>
        </div>

        <div class="selection-result">
            <h2 class="result-title">选择结果</h2>
            <div class="pairs-container" id="pairsContainer">
                <p style="color: #8892b0;">等待选择开始...</p>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="startSelection()">开始选择</button>
            <button class="btn btn-secondary" onclick="reset()">重置</button>
        </div>
    </div>

    <script>
        // 模拟数据 - 与代码中的逻辑一致
        const population = [
            { id: 0, fitness: 15, name: '个体 #1' },
            { id: 1, fitness: 25, name: '个体 #2' },
            { id: 2, fitness: 10, name: '个体 #3' },
            { id: 3, fitness: 30, name: '个体 #4' },
            { id: 4, fitness: 20, name: '个体 #5' },
            { id: 5, fitness: 18, name: '个体 #6' },
            { id: 6, fitness: 12, name: '个体 #7' },
            { id: 7, fitness: 22, name: '个体 #8' }
        ];

        const ELITE_COUNT = 2;
        let rouletteChart = null;
        let cumulativeProbabilities = [];
        let totalFitness = 0;
        let selectedPairs = [];
        let currentStep = 0;
        let isRunning = false;

        // 颜色配置
        const colors = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4',
            '#ffeaa7', '#dfe6e9', '#a29bfe', '#fd79a8'
        ];

        function init() {
            // 计算总适应度
            totalFitness = population.reduce((sum, ind) => sum + ind.fitness, 0);
            document.getElementById('totalFitness').textContent = `总适应度: ${totalFitness}`;

            // 计算累积概率
            cumulativeProbabilities = [];
            let cumSum = 0;
            population.forEach(ind => {
                cumSum += ind.fitness;
                cumulativeProbabilities.push(cumSum);
            });

            // 渲染个体表格
            renderIndividualsTable();

            // 渲染累积概率条
            renderCumulativeBar();

            // 初始化轮盘图
            initRouletteChart();
        }

        function renderIndividualsTable() {
            const tbody = document.getElementById('individualsBody');
            tbody.innerHTML = '';

            population.forEach((ind, index) => {
                const tr = document.createElement('tr');
                const isElite = index < ELITE_COUNT;

                tr.innerHTML = `
                    <td>${ind.name}</td>
                    <td>${ind.fitness}</td>
                    <td>${cumulativeProbabilities[index].toFixed(1)}</td>
                    <td>${isElite ? '<span style="color: #ffd700;">🎖️ 精英</span>' : '-'}</td>
                `;

                if (isElite) {
                    tr.classList.add('elite');
                }

                tbody.appendChild(tr);
            });
        }

        function renderCumulativeBar() {
            const bar = document.getElementById('cumulativeBar');
            bar.innerHTML = '';

            population.forEach((ind, index) => {
                const segment = document.createElement('div');
                segment.className = 'cumulative-segment';
                segment.style.width = `${(ind.fitness / totalFitness) * 100}%`;
                segment.style.backgroundColor = colors[index];
                segment.style.color = '#1a1a2e';
                segment.textContent = ind.name.split(' ')[1];
                segment.id = `segment-${index}`;

                bar.appendChild(segment);
            });
        }

        function initRouletteChart() {
            const ctx = document.getElementById('rouletteCanvas').getContext('2d');

            const data = population.map(ind => ({
                value: ind.fitness,
                color: colors[ind.id]
            }));

            // 创建饼图数据
            const chartData = {
                labels: population.map(ind => ind.name),
                datasets: [{
                    data: population.map(ind => ind.fitness),
                    backgroundColor: colors,
                    borderColor: '#1a1a2e',
                    borderWidth: 2
                }]
            };

            rouletteChart = new Chart(ctx, {
                type: 'pie',
                data: chartData,
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const prob = (context.raw / totalFitness * 100).toFixed(1);
                                    return `${context.label}: ${context.raw} (${prob}%)`;
                                }
                            }
                        }
                    },
                    animation: {
                        duration: 500
                    }
                }
            });
        }

        async function startSelection() {
            if (isRunning) return;

            isRunning = true;
            document.getElementById('startBtn').disabled = true;
            selectedPairs = [];
            currentStep = 0;

            const pairsContainer = document.getElementById('pairsContainer');
            pairsContainer.innerHTML = '';

            // 需要选择 (种群大小 - 精英数量) 对
            const numPairs = population.length - ELITE_COUNT;
            const pairsToSelect = [];

            // 模拟选择过程
            for (let i = 0; i < numPairs; i++) {
                // 生成两个随机数进行选择
                const rand1 = Math.random() * totalFitness;
                const rand2 = Math.random() * totalFitness;

                const selected1 = findSelectedIndividual(rand1);
                const selected2 = findSelectedIndividual(rand2);

                pairsToSelect.push([selected1, selected2]);

                // 动画展示
                await animateSelection(rand1, rand2, i);

                // 添加结果
                addPairResult(i, selected1, selected2);
            }

            // 完成
            document.getElementById('explanation').innerHTML =
                '<strong>✅ 选择完成！</strong><br>共选择了 ' + numPairs + ' 对父代用于繁殖。精英个体直接保留到下一代。';

            isRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('progressFill').style.width = '100%';
        }

        function findSelectedIndividual(randomValue) {
            // 使用二分查找找到对应的个体
            for (let i = 0; i < cumulativeProbabilities.length; i++) {
                if (randomValue <= cumulativeProbabilities[i]) {
                    return population[i];
                }
            }
            return population[population.length - 1];
        }

        async function animateSelection(rand1, rand2, pairIndex) {
            // 显示随机数
            document.getElementById('randomValue').style.display = 'block';
            document.getElementById('stepDescription').style.display = 'block';

            // 动画：第一个随机数
            document.getElementById('randomNum').textContent = rand1.toFixed(2);
            document.getElementById('stepText').innerHTML =
                `第 ${pairIndex + 1} 轮选择：<br>
                 第一个随机数 <code>${rand1.toFixed(2)}</code> 落在累积区间内，<br>
                 选中 <strong>${findSelectedIndividual(rand1).name}</strong>`;

            // 突出显示选中的区间
            highlightSegment(findSelectedIndividual(rand1).id);

            await sleep(1500);

            // 动画：第二个随机数
            document.getElementById('randomNum').textContent = rand2.toFixed(2);
            document.getElementById('stepText').innerHTML =
                `第 ${pairIndex + 1} 轮选择：<br>
                 第一个随机数 <code>${rand1.toFixed(2)}</code> → <strong>${findSelectedIndividual(rand1).name}</strong><br>
                 第二个随机数 <code>${rand2.toFixed(2)}</code> → <strong>${findSelectedIndividual(rand2).name}</strong>`;

            highlightSegment(findSelectedIndividual(rand2).id);

            await sleep(1500);

            // 清除高亮
            clearHighlights();

            // 更新进度条
            const progress = ((pairIndex + 1) / (population.length - ELITE_COUNT)) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }

        function highlightSegment(index) {
            // 高亮表格行
            const rows = document.querySelectorAll('#individualsBody tr');
            rows.forEach((row, i) => {
                if (i === index) {
                    row.classList.add('selected');
                } else {
                    row.classList.remove('selected');
                }
            });

            // 高亮累积条
            const segment = document.getElementById(`segment-${index}`);
            if (segment) {
                segment.classList.add('highlight-segment');
            }
        }

        function clearHighlights() {
            document.querySelectorAll('#individualsBody tr').forEach(row => {
                row.classList.remove('selected');
            });

            document.querySelectorAll('.cumulative-segment').forEach(seg => {
                seg.classList.remove('highlight-segment');
            });
        }

        function addPairResult(index, ind1, ind2) {
            const container = document.getElementById('pairsContainer');

            const pair = document.createElement('div');
            pair.className = 'pair';
            pair.style.animationDelay = `${index * 0.1}s`;

            pair.innerHTML = `
                <div class="pair-number">${index + 1}</div>
                <div class="individual-chip" style="background: ${colors[ind1.id]}33; color: ${colors[ind1.id]}">
                    ${ind1.name} (${ind1.fitness})
                </div>
                <span class="vs">×</span>
                <div class="individual-chip" style="background: ${colors[ind2.id]}33; color: ${colors[ind2.id]}">
                    ${ind2.name} (${ind2.fitness})
                </div>
            `;

            container.appendChild(pair);
        }

        function reset() {
            selectedPairs = [];
            currentStep = 0;
            isRunning = false;

            document.getElementById('startBtn').disabled = false;
            document.getElementById('pairsContainer').innerHTML = '<p style="color: #8892b0;">等待选择开始...</p>';
            document.getElementById('randomValue').style.display = 'none';
            document.getElementById('stepDescription').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('explanation').innerHTML = '点击"开始选择"按钮开始动画演示';

            clearHighlights();
            init();
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 初始化
        init();
    </script>
</body>
</html>
